<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Quiet Pages | Space for Being</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500;600&family=Caveat:wght@400;500&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Inter', sans-serif;
      color:#2F3B4A;
      background:
        linear-gradient(rgba(245,242,237,0.92), rgba(245,242,237,0.94)),
        url("Images/Menu/b.png");
      background-size:cover;
      background-attachment:fixed;
      line-height:1.2;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .back-wrapper{
      width:min(1200px,90%);
      margin:24px auto 0;
    }

    .back-home{
      display:inline-block;
      font-size:12px;
      letter-spacing:1px;
      text-transform:uppercase;
      color:#31476E;
      border-bottom:1px solid #31476E;
      padding-bottom:5px;
      margin-left: 70px;
    }

    /* INTRO */
    .intro{
      width:min(1000px,95%);
      margin:30px auto 40px;
      text-align:center;
    }

    .intro h1{
      font-family:'Cormorant Garamond', serif;
      font-size:30px;
      font-weight:600;
      color:#2F4A5C;
      line-height:1;
      margin-bottom:10px;
    }

    .intro p{
      font-size:12px;
      color:#687580;
      line-height:1.9;
    
    }

    .intro em{
      display:block;
      margin-top:10px;
      font-family:'Caveat', cursive;
      font-size:23px;
      color:#6B7D8A;
    }

    /* NOTES SLIDER */
    .notes-slider{
      width:min(1180px,90%);
      margin:0 auto 30px;

      display:flex;
      align-items:center;
      justify-content:center;
      gap:22px;
    }

    .note-wrap{
      flex:1;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
    }

    .note-card{
      background:rgba(255,255,255,0.74);
      border:1px solid rgba(47,59,74,0.11);
      padding:38px 40px;
      min-height:260px;
      box-shadow:0 14px 38px rgba(47,59,74,0.06);
      transition:0.35s ease;
      position:relative;
    }

    .note-card:hover{
      transform:translateY(-5px);
      box-shadow:0 18px 45px rgba(47,59,74,0.1);
    }

    .note-card::before{
      content:"";
      position:absolute;
      top:0;
      left:0;
      width:4px;
      height:100%;
      background:rgba(111,128,141,0.25);
    }

    .note-date{
      font-size:10px;
      letter-spacing:3px;
      text-transform:uppercase;
      color:#A08A72;
      margin-bottom:20px;
    }

    .note-card h2{
      font-family:'Cormorant Garamond', serif;
      font-size:18px;
      font-weight:600;
      line-height:1.15;
      color:#2F3B4A;
      margin-bottom:10px;
    }

    .korean-title{
      font-size:14px;
      color:#8a94a3;
      letter-spacing:1px;
      margin-top:-4px;
      margin-bottom:18px;
      font-style:italic;
      font-family:'Caveat', cursive;
    }

    .note-card p{
      font-size:13px;
      line-height:1.8;
      color:#444;
      text-align:justify;
      word-break:keep-all;
    }

    .line{
      width:42px;
      height:1px;
      background:rgba(47,59,74,0.25);
      margin:20px 0 14px;
    }

    .page-btn{
      width:48px;
      height:48px;
      border:none;
   
      color:#31476e;
      font-size:20px;
      cursor:pointer;

      transition:0.3s ease;
      flex-shrink:0;
    }

    .page-btn:hover{
      transform:translateY(-3px);
      background:#fff;
    }

    .page-count{
      text-align:center;
      font-size:11px;
      color:#9A9FA5;
      letter-spacing:2px;
      margin-bottom:60px;
    }

    /* NOTEBOOK INDEX */
    .notebook-index{
      width:min(700px,90%);
      margin:40px auto 80px;
      padding-top:40px;
      border-top:1px solid #d8d8d8;
    }

    .notebook-index h3{
      font-family:'Cormorant Garamond', serif;
      font-size:18px;
      font-weight:500;
      color:#31476e;
      margin-bottom:10px;
    }

    #index-list{
      width:100%;

      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(320px,1fr));

      gap:10px 30px;
    }
     
    #index-list a{
    
      display:grid;
      grid-template-columns:120px 1fr;
      column-gap:12px;

      text-decoration:none;
      color:#18376b;
      font-size:12px;
      line-height:1.0;
    }

    .index-date{
      color:#353a41;
      font-size:11px;
      text-align:left;
      grid-template-columns:100px 1fr;
    }

    .index-title{
      color:#0d1420;
    }
   
    footer{
      padding:34px 0;
      text-align:center;
      font-size:12px;
      color:#8B9298;
      border-top:1px solid rgba(47,59,74,0.1);
    }

    @media(max-width:800px){
      body{
        background:#d7cfc3;

        background-image:none;
        background-attachment:scroll;
        background-position:center top;
      }

      .back-wrapper{
        margin:8px auto 0;
      }

      .back-home{
        font-size:8px;
        letter-spacing:0.6px;
        margin-left:0;
        border-bottom:none;
        padding-bottom:0;
      }

      .intro{
        width:100%;
        margin:14px auto 24px;

      }

      .intro h1{
       font-size:22px;
      }
     
      .intro em{
       font-size:14px;
      }

      .intro p{
       display:none;
      }

      .notes-slider{
        width:96%;
        gap:6px;
      }

      .note-wrap{
        grid-template-columns:1fr;
      }

      .note-date{
        font-size:8px;
        letter-spacing:2px;
        margin-bottom:12px;
      }

      .note-card h2{
        font-size:14px;
        margin-bottom:6px;
      }

      .korean-title{
        font-size:11px;
        margin-bottom:12px;
      }
      
      .note-card p{
        font-size:12px;
        line-height:1.8;
        text-align:left;
        word-break:normal;
        letter-spacing:0;
        font-size:12px;
        line-height:1.8;
      
      }
     
      .page-btn{
        width:36px;
        height:36px;
        font-size:16px;
      }

      .page-btn{
        width:auto;
        height:auto;

        background:none;
        border:none;

        color:#31476e;
        font-size:20px;
        cursor:pointer;

        padding:0;
        transition:0.3s ease;
        flex-shrink:0;
      }

      .page-btn:hover{
        background:none;
        transform:none;
        opacity:0.6;
      }
    }
    
  </style>

</head>

<body>

  <div class="back-wrapper">
    <a href="index.html" class="back-home">
      BACK TO HOME
    </a>
  </div>

  <section class="intro">

    <h1>Quiet Pages</h1>

    <p>
      A small place for sentences that do not need to become full stories.

  <div class="page-count" id="page-count"></div>

  <!-- NOTEBOOK INDEX -->
  <section class="notebook-index">

    <h3>Notebook Index</h3>

     <div id="index-list"></div>

    const notesPerPage = 4;
    let currentPage = 0;

    function renderNotes(){
      const wrap = document.getElementById("note-wrap");
      wrap.innerHTML = "";

      const start = currentPage * notesPerPage;
      const pageNotes = notes.slice(start, start + notesPerPage);

      pageNotes.forEach(note => {
        wrap.innerHTML += `
          <article class="note-card">
            <div class="note-date">${note.date}</div>

            <h2>${note.title}</h2>

            ${note.korean ? `<p class="korean-title">${note.korean}</p>` : ""}

            <p>${note.body}</p>

            <div class="line"></div>
          </article>
        `;
      });
      
      const totalPages = Math.ceil(notes.length / notesPerPage);

      document.getElementById("page-count").innerText =
        `${currentPage + 1} / ${totalPages}`;
    }
    
    const params = new URLSearchParams(window.location.search);
    const targetDate = params.get("date");

    if (targetDate) {
       const targetIndex = notes.findIndex(note => note.date === targetDate);

       if (targetIndex !== -1) {
         currentPage = Math.floor(targetIndex / notesPerPage);
        }
    }

    function changePage(step){
      const totalPages = Math.ceil(notes.length / notesPerPage);

      currentPage += step;

      if(currentPage < 0){
        currentPage = totalPages - 1;
      }

      if(currentPage >= totalPages){
        currentPage = 0;
      }

      renderNotes();
    }

    function goToPage(pageNumber){
      const totalPages = Math.ceil(notes.length / notesPerPage);

      if(pageNumber >= 0 && pageNumber < totalPages){
        currentPage = pageNumber;
        renderNotes();
      }
    }

    function renderIndex(){
      const indexList = document.getElementById("index-list");
       indexList.innerHTML = "";

       notes.forEach((note, index) => {
        const pageNumber = Math.floor(index / notesPerPage);

        indexList.innerHTML += `
          <a href="#" onclick="goToNote(${pageNumber}, ${index}); return false;">
            <span class="index-date">${note.date ? note.date : "No date"}</span>
            <span class="index-title">${note.title}</span>
         </a>
        `;
     });
    }

    function goToNote(pageNumber, noteIndex){
       currentPage = pageNumber;
       renderNotes();

       setTimeout(() => {
          const cards = document.querySelectorAll(".note-card");
          const indexOnPage = noteIndex % notesPerPage;

          if(cards[indexOnPage]){
            cards[indexOnPage].scrollIntoView({
              behavior: "smooth",
              block: "start"
            });
          }
        }, 50);
      }

       renderNotes();
       renderIndex();
  </script>
