<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ways of Wandering</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Montserrat:wght@300;400;500&family=Caveat:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:
        linear-gradient(rgba(246,245,242,0.95), rgba(246,245,242,0.95)),
        url("Images/ways/rail.png");
      background-size:cover;
      background-attachment:fixed;
      font-family:'Montserrat', sans-serif;
      color:#2d3e52;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    img{
      width:100%;
      display:block;
    }

    .back-wrapper{
      width:min(1200px,90%);
      margin:24px auto 0;
    }

    .back-home{
      display:inline-block;
      font-size:11px;
      letter-spacing:1px;
      text-transform:uppercase;
      color:#31476E;
      border-bottom:1px solid #31476E;
      padding-bottom:5px;
    }

    .intro{
      width:min(900px,90%);
      margin:55px auto 45px;
      text-align:center;
    }

    .intro span{
      font-family:'Caveat', cursive;
      font-size:36px;
      letter-spacing:2.5px;
      font-weight: 600;
      color:#637c9e;
    }

    .intro h1{
      margin-top:8px;
      font-family:'Cormorant Garamond', serif;
      font-size:24px;
      color:#31476E;
    }

    .intro p{
      margin-top:14px;
      font-size:12px;
      letter-spacing:3px;
      text-transform:uppercase;
      color:#7d8896;
    }

    .journey-grid{
      width:min(1200px,90%);
      margin:0 auto 60px;

      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:22px;
    }

    .journey-card{
       
      position:relative;
      min-height:90px;
      padding:18px;

      display:flex;
      align-items:center;
      justify-content:center;

      text-align:center;
      overflow:hidden;

      background:rgba(255,255,255,0.72);
      border:1px solid rgba(49,71,110,0.22);
      cursor:pointer;
    }

    .journey-card img{
     position:absolute;
     inset:0;
     filter:none;
     width:100%;
     height:100%;

     object-fit:cover;
     opacity:0.45;

     z-index:0;
    }

   .journey-card::after{
     content:"";
     position:absolute;
     inset:0;

     background:rgba(255,255,255,0.55);
     z-index:1;
    }

   .journey-card-content{
      position:relative;
      z-index:2;
    }

    .journey-card:hover{
      transform:translateY(-7px);
      box-shadow:0 22px 55px rgba(49,71,110,0.14);
    }

    .journey-card.active{
      border-color:#31476E;
      box-shadow:0 0 0 1px rgba(49,71,110,0.25);
      background:rgba(255,255,255,0.92);
    }

    .journey-card-content span{
      font-size:10px;
      letter-spacing:4px;
      color:#4e607a;
      font-size:11px;
    }

    .journey-card-content h3{
      margin:12px 0 ;
      color:#31476E;
      font-weight:600;
      font-family:'Plus Jakarta Sans', sans-serif;
      font-size:16px;
      font-weight:700;
      letter-spacing:-0.5px;
      margin-bottom:10px
    }

    .journey-card-content p{
      font-size:13px;
      line-height:1.8;
      color:#566171;
    }

    .detail-section{
      width:min(1200px,90%);
      margin:0 auto 90px;

      background:rgba(255,255,255,0.76);
      border:1px solid rgba(49,71,110,0.14);
      box-shadow:0 18px 50px rgba(49,71,110,0.08);

      padding:42px;
    }

    .detail-top span{
      font-size:11px;
      letter-spacing:3px;
      text-transform:uppercase;
      color:#8a94a3;
    }

    .detail-top h2{
      margin:8px 0 16px;
      font-family:'Cormorant Garamond', serif;
      font-size:28px;
      color:#31476E;
    }

    .detail-top p{
      max-width:760px;
      font-size:13px;
      line-height:1.6;
      color:#566171;
      white-space:pre-line;
    }

    .place-list{
      margin:28px 0;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .place-list span{
      display:inline-block;
      padding:9px 14px;
      background:rgba(238,243,247,0.9);
      border:1px solid rgba(49,71,110,0.12);
      font-size:11px;
      letter-spacing:1px;
      color:#46566b;
    }

    .photo-grid{
      margin-top:34px;
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:14px;
    }

    .photo-grid img{
      width:100%;
      object-fit:cover;
      border-radius:4px;
    }

    /* 첫 번째, 두 번째 사진 */

    .photo-grid img:nth-child(1),
    .photo-grid img:nth-child(2){

      grid-column:span 2;
      height:280px;
    }

    /* 나머지 작은 사진 */

    .photo-grid img:nth-child(n+3){
      height:150px;
    }

    .photo-grid.small-grid{
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:14px;
    }

    .photo-grid.small-grid img{
      width:100%;
      height:150px;
      object-fit:cover;
      border-radius:4px;
    }

    .small-grid img:nth-child(1),
    .small-grid img:nth-child(2){
      grid-column:auto;
      height:150px;
    }

    .place-list button{
      padding:9px 14px;
      background:rgba(238,243,247,0.9);
      border:1px solid rgba(49,71,110,0.12);
      font-size:11px;
      letter-spacing:1px;
      color:#46566b;
      cursor:pointer;
    }

    .place-list button.active{
      background:#31476E;
      color:white;
      border-color:#31476E;
    }

    .note{
      max-width:800px;
      margin-top:40px;
      padding-top:30px;
      border-top:1px solid rgba(49,71,110,.15);
      font-size:15px;
      line-height:2;
      color:#566171;
      white-space:pre-line;
    
    }

  @media(max-width:650px){

    body{
      background-attachment:scroll;
    }

    .back-wrapper{
      width:88%;
      margin:12px auto 0;
    }
 
    .back-home{
      font-size:8px;
      letter-spacing:1px;
      padding-bottom:3px;
    }

    .intro{
      width:88%;
      margin:24px auto 16px;
      padding:0;
      text-align:center;
    }

    .intro span{
      font-size:11px;
      letter-spacing:3px;
    }

   .intro h1{
     margin-top:6px;
     font-size:18px;
    }

    .intro p{
     display:none;
    }

   .journey-grid{
     width:88%;
     margin:0 auto 20px;
     grid-template-columns:repeat(2, 1fr);
     gap:5px;
    }

   .journey-card{
     min-height:0;
     height: 50px;
     padding:4px;
    }

   .journey-card-content span{
     display:none;
    }

   .journey-card-content h3{
     margin:6px 0 0;
     font-size:12px;
     line-height:1.2;
    }

   .journey-card-content p{
     display:none;
    }

   .detail-section{
     width:88%;
     margin:0 auto 30px;
     padding:20px 12px;
    }

   .detail-top span{
     font-size:9px;
     letter-spacing:2px;
    }

   .detail-top h2{
     margin:6px 0 10px;
     font-size:16px;
    }

   .detail-top p{
     display: none;
    }

   .place-list{
     margin:20px 0;
     gap:8px;
    }

    .place-list button,
    .place-list span{
     font-size:9px;
     letter-spacing:1px;
     padding:7px 10px;
    }

   .photo-grid,
   .photo-grid.small-grid{
     margin-top:24px;
     display:grid;
     grid-template-columns:repeat(2, 1fr);
     gap:10px;
    }

   .photo-grid img,
   .photo-grid img:nth-child(1),
   .photo-grid img:nth-child(2),
   .photo-grid img:nth-child(n+3),
   .photo-grid.small-grid img,
   .photo-grid.small-grid img:nth-child(1),
   .photo-grid.small-grid img:nth-child(2){
     grid-column:auto;
     width:100%;
     height:135px;
     object-fit:cover;
    }

   .note{
     margin-top:18px;
     padding-top:20px;
     font-size:12px;
     line-height:1.4;
     letter-spacing:0.8px;
    }
  }

</style>

<script defer src="https://static.cloudflareinsights.com/beacon.min.js"

</head>

<body>

  <div class="back-wrapper">
    <a href="index.html" class="back-home">
      ← BACK TO HOME
    </a>
  </div>

  <section class="intro">
    <span>Travel Collections</span>
    <h1></h1>
    <p>Roads, rails, seas, skies, and footsteps</p>
  </section>

  <section class="journey-grid">

    <button class="journey-card active" onclick="showJourney('rail', this)">
      <img src="Images/ways/train.png" alt="Rail Journeys">
      <div class="journey-card-content">
        <span>BY TRAIN</span>
        <h3>Rail Journeys</h3>
      </div>

    </button>

    <button class="journey-card" onclick="showJourney('island', this)">
      <img src="Images/ways/hopping.png" alt="Island Hopping">
      <div class="journey-card-content">
        <span>BY BOAT</span>
        <h3>Island Hopping</h3>
      </div>
    </button>

    <button class="journey-card" onclick="showJourney('walking', this)">
      <img src="Images/ways/walking.png" alt="Walking Cities">
      <div class="journey-card-content">
        <span>HOP-ON HOP-OFF</span>
        <h3>Walking Cities</h3>
      </div>
    </button>

    <button class="journey-card" onclick="showJourney('boat', this)">
      <img src="Images/ways/cruise.png" alt="Boats and Cruises">
      <div class="journey-card-content">
        <span>BY FERRY</span>
        <h3>Boats & Cruises</h3>
      </div>
    </button>

    <button class="journey-card" onclick="showJourney('road', this)">
      <img src="Images/ways/road.png" alt="Road Trips">
      <div class="journey-card-content">
        <span>BY CAR</span>
        <h3>Road Trips</h3>
      </div>
    </button>

    <button class="journey-card" onclick="showJourney('aircraft', this)">
      <img src="Images/ways/aircraft.png" alt="Small Aircraft">
      <div class="journey-card-content">
        <span>BY SMALL PLANE</span>
        <h3>Small Aircraft</h3>
      </div>
    </button>

  </section>

  <section class="detail-section" id="journey-detail">

    <div class="detail-top">
      <span id="detail-label">By Train</span>
      <h2 id="detail-title">Rail Journeys</h2>
      <p id="detail-desc">
         Stories seen through train windows —
        from Japanese local trains to quiet European rails.
      </p>
    </div>

    <div class="place-list" id="place-list"></div>

    <div class="photo-grid" id="photo-grid"></div>

    <p class="note" id="detail-note"></p>

  </section>

  <script>
    const journeys = {
    rail: {
      label: "By Train",
      title: "Rail Journeys",
      desc: `Stories seen through train windows`,
      places: [
        {
          name: "Japan",
          images: [
            "Images/ways/nomori1.jpg",
            "Images/ways/kana1.png",
            "Images/ways/ampangman4.png",
            "Images/ways/furano3.png",
            "Images/ways/naga6.jpg",
            "Images/ways/okinawa13.jpg",
          ],
          note: `테마가 있는 기차 여행.
           일본 기차는 보는 것만으로도 하나의 즐거움이다.
           지역, 도시를 대표하는 관광명소나 상품 홍보를 하고 있어 보는 재미가 있다.
           지금이야 이나라 저 나라에서 그런 부분을 따라 하고 있지만 그 당시에는 신선했다.
           기차 마니아인 나는 일본 여행을 할 때마다 기차와 버스를 기본으로 이동 경로를 계획한다.
           첫 일본 여행지인 나가사키에서 하우스텐보스에 가는 기차는 객실은 평범했지만 한 시간 내내 바다를 보며 갈 수 있다는 점이 좋았는데 내게 바다는 동해 바다이기에 거기에 비하면 딱히 인상적이지는 않았다.
           가장 인상에 남는 기차는 역시 '유후인노모리'다.
           후쿠오카역에서 에키벤을 사서 기차 안에서 먹었는데 통일호 생각도 나고 즐거웠다. 기대했던 것보다 맛은 그닥..
           기차역마다 다른 도시락 메뉴를 판매하니 호기심 천국인 나에게는 매우 유혹적이다.
          신칸센은 매우 훌륭하지만 내가 원하는 아기자기한 재미를 주지는 못 했다.`
        },
        {
          name: "EU",
          images: [
            "Images/ways/bristol.jpg",
            "Images/ways/zurich.jpg",
            "Images/ways/groningen.jpg",
            "Images/ways/london.jpg",
            "Images/ways/tgv.png",
            "Images/ways/lt1.jpg",
          ],
          note: `Harry Potter 9 3/4 Platform.
          처음 France 유학 시절 TGV를 처음 보았을 때 와.. 하고 감탄했던 기억이 있다.
          신칸센과 같은 감상이다. 훌륭하다.. 끝.
          Bristol에서 런던으로 돌아오는 기차가 비가 온다는 이유로 지연되어 예매해 둔 뮤지컬을 보지 못한 원한으로
          영국 기차 운영 시스템에 대해 심히 감정이 좋지 않다.
          다만 유럽의 기차역들은 정말 인상적이었다.
          세월의 흔적이 보이는 건물과 기차역 내부의 구성이 매우 흥미로웠다.
          특히 Zurich 역 내의 팝업스토어들은 신선한 경험이었다.`
        },
        {
          name: "Malaysia",
          images: [
            "Images/ways/gombak.jpg",
            "Images/ways/ipohstation.jpg",
            "Images/ways/klsentral1.jpg",
            "Images/ways/taiping.jpg",
            "Images/ways/mtrain.jpg",
            "Images/ways/station.jpg",
          ],
          note: `EST
           Malaysia는 기차 여행이 매우 제한적이다.
           기차도 내부 시설도 꽤 좋은 편인데 철도를 설치할 수 있는 한계가 있는 것인지 KL에서 3-4시간 걸리는 루트가 최대이다.
           KTX 수준의 기차는 없다고 보면 된다.
           그래도 기차를 타 보겠다며 기어코 갈 수 있는 곳을 찾아다녔다.
           그러나 다섯 번의 여행 중 4번은 목적지가 중복되고 더 이상 갈 수 있는 곳이 없다.
           기차 노선이 확대되면 여행할 수 있는 기회가 더 많아질 텐데.. 아쉽다.`
        },
      ]
    },
  
    island: {
      label: "By Ferry",
      title: "Island Hopping",
      desc: `Crossing the sea, one island at a time.`,
      places: [
        {
          name: "Redang Island",
          images: [

             "Images/ways/redang1.jpg",
             "Images/ways/redang2.jpg",
             "Images/ways/redang3.jpg",
             "Images/ways/redang4.jpg",
             "Images/ways/redang5.jpg",
             "Images/ways/redang6.jpg",
          ],
          note: `Stephanie's book 의 배경이 된 곳.
           Lock down이 풀리고 국내 여행만 가능해졌을 때 교통수단이 가능한 곳을 골라 가게 된 곳.
           사진은 엄청 근사하게 나왔으나 리조트는 너~무 낡았고 우리가 아는 편의 시설도 거의 없었다.
           다만, 어딘지 모르게 내가 좋아하는 바다를 닮아 있어 편안함을 느꼈다.
           지금은 용량 문제로 동영상까지 올리긴 어렵지만 언젠가 동영상 업로드가 가능해지면 Sunrise full 영상을 올리려고 한다.
           우리나라에서는 그렇게 어렵게 한번 보는 것을.
           오도 가도 못 하는 슬픈 시기였지만 그래도 많은 것을 깨닫게 해 준 소중한 시간이기도 하다.`
        },

        {
          name: "Langkawi",
          images: [
             "Images/ways/lan1.jpg",
             "Images/ways/lan2.jpg",
             "Images/ways/lan3.jpg",
             "Images/ways/lan4.jpg",
             "Images/ways/lan5.jpg",
             "Images/ways/lan6.jpg",
          ],
          note: `Paradise 101 Langkawi.
          우리 집에 두 번이나 방문한 어린이 손님을 위해 선택한 곳.
          처음에 선착장에 도착했을 때는 잘못 온 거 아닌가 싶게 이상한 곳이었는데 일단 배는 뜬다 하니 기다리면서 해변을 즐겼다.
          갑자기 어떤 사람이 소리를 지르길래 저분은 어디가 아픈가? 했는데 옆에 있던 사람도 어딘가를 가리키며 소리를 지르기 시작했다.
          그래서 호기심 천국인 내가 무슨 일인지 물었더니 고래가 보인다는 것이었다. 
          우와! 어떻게든 한 번 봐야겠다고 아무리 눈을 부릅뜨고 바라봐도 살짝 뭔가 올라갔다가 내려가는 느낌만 있었을 뿐.
          저 사람들은 저게 보인단 말인가? 고래가 나타났다는 것보다 그게 보인다는 사실이 더 신기했다.
          그 시간에 그 섬에 있었다면 볼 수 있었을 텐데 하는 아쉬움이 남았으나 2년 후 다른 섬에서 보게 되어 그나마 다행.`
        },

        {
          name: "Palau",
          images: [
            "Images/ways/palau7.jpg",
            "Images/ways/palau6.jpg",
            "Images/ways/palau9.jpg",
            "Images/ways/palau10.jpg",
            "Images/ways/palau11.jpg",
            "Images/ways/palau1.jpg",
          ],
          note: `특가만 뜨면 바로 예약을 해 버리는 이 단순한 머리로 그때는 거의 알려지지 않았던 Palau 여행을 예약하고
           아들의 담임 선생님에게 연락을 드렸다. 저희가 어디를 좀 가야 해서 학교를 이틀 정도 못 갈 것 같아요.
           잠시 정적이 흐르고 담임 선생님께서 잠시 확인 좀 하고 연락드리겠다고 했다.
           담임 선생님이 잠시 후 전화를 하셔서는 매우 난감해하며 "어머님, 교감 선생님한테 여쭤봤는데 죄송하지만 여행을 취소하시면 안 될까요?" 하셨다.
           "암.. 저 이미 결제를 해 버렸는데요.." 처음 알았다. 고딩은 통보가 아니라 허락을 구해야 한다는 것을.

  function showJourney(id, button){
    const data = journeys[id];

    document.getElementById("detail-label").innerText = data.label;
    document.getElementById("detail-title").innerText = data.title;
    document.getElementById("detail-desc").innerText = data.desc;

    document.getElementById("place-list").innerHTML =
      data.places.map((place, index) => `
        <button
          class="${index === 0 ? 'active' : ''}"
          onclick="showPlace('${id}', ${index}, this)"
        >
          ${place.name}
        </button>
      `).join("");

    showPlace(id, 0, document.querySelector("#place-list button"));

    document.querySelectorAll(".journey-card").forEach(card => {
      card.classList.remove("active");
    });

    button.classList.add("active");

    document.getElementById("journey-detail").scrollIntoView({
      behavior: "smooth",
      block: "start"
    });
  }

  function showPlace(journeyId, placeIndex, button){
    const place = journeys[journeyId].places[placeIndex];
    const grid = document.getElementById("photo-grid");

    grid.className =
      place.layout === "small"
        ? "photo-grid small-grid"
        : "photo-grid";

    grid.innerHTML =
      place.images.map(img => `
        <img src="${img}" alt="" loading="lazy" decoding="async">
     `).join("");

    document.querySelectorAll('#photo-grid img').forEach(img => {

      img.addEventListener('click', () => {
        if(modal && modalImg){
          modal.style.display = 'flex';
          modalImg.src = img.src;
        }
      });
    });

    document.getElementById("detail-note").innerText = place.note;

    document.querySelectorAll("#place-list button").forEach(btn => {
      btn.classList.remove("active");
    });

    button.classList.add("active");
  }

  const modal = document.getElementById('modal');
  const modalImg = document.getElementById('modal-img');
  const closeBtn = document.getElementById('close-btn');

  if(closeBtn && modal){
     closeBtn.addEventListener('click', () => {
       modal.style.display = 'none';
     });
  }

function openFromUrl(){
  const params = new URLSearchParams(window.location.search);
  const targetJourney = params.get("journey");
  const targetPlace = params.get("place");

  if(targetJourney && journeys[targetJourney]){
    const journeyBtn = document.querySelector(
      `.journey-card[onclick*="'${targetJourney}'"]`
    );

    showJourney(targetJourney, journeyBtn);

    if(targetPlace){
      const placeIndex = journeys[targetJourney].places.findIndex(place =>
        place.name.toLowerCase().trim() === targetPlace.toLowerCase().trim()
      );

      if(placeIndex >= 0){
        const placeBtn = document.querySelectorAll("#place-list button")[placeIndex];
        showPlace(targetJourney, placeIndex, placeBtn);
      }
    }

    return;
  }

  showJourney("rail", document.querySelector(".journey-card"));
}

openFromUrl();
