     body: `
        <p> There was a time when I believed that having more meant living better. 
         A larger home, more furniture, more decorations, more things to fill empty spaces. 
         Like many people, I thought comfort came from ownership. </p>
        <p> But living abroad taught me something I had never expected. When you know that you may leave one day, 
         you begin to look at your belongings differently. Every object becomes something you might eventually have to pack, carry, give away, or leave behind. </p>
        <p> At first, that felt unsettling. I stopped buying things impulsively. 
         I learned to ask myself a simple question before bringing something home. </p> 
        <div class="quote"> Would I still want this<br> 
         if I had to move again next year? 
        </div>
        <p> Most of the time, the answer was no. Over the years, my possessions became fewer, but strangely, my space felt richer. </p>
        <p> The less I owned, the more attention I gave to the things I chose to keep. A favorite mug. 
         A comfortable chair. A small lamp that makes the room feel warm in the evening. 
         Each object earned its place. </p> 
        <p> People often assume that minimal living means having less. For me, it became about appreciating more. 
         More space to breathe. More room for quiet mornings. More freedom to leave when life asks me to. </p> 
        <p> Perhaps that is why I spend so much time cleaning, organizing, and caring for the place I live. It is not my permanent home. 
         In fact, that may be the very reason I treat it with greater care. </p> 
        <p> A rented apartment, a temporary room, a place I may eventually leave — these spaces still hold my everyday life. 
         They deserve attention. They deserve gratitude. </p> 
        <p> Minimal living was never about empty shelves or perfectly organized drawers. 
         It was about learning that peace does not come from owning more things. </p> 
        <p> Sometimes, it comes from knowing that you already have enough. 
         And when the time comes to leave, I hope I can close the door gently, carrying only what truly matters. </p>
     `

       <p>

 let currentEssay = 0;

function showEssay(index){
  const essay = essays[index];

  if(!essay){
    console.log("No essay found:", index);
    return;
  }

  currentEssay = index;

  document.getElementById("essay-meta").innerText = essay.meta || "";
  document.getElementById("essay-title").innerText = essay.title || "";
  document.getElementById("essay-subtitle").innerText = essay.subtitle || "";
  document.getElementById("essay-body").innerHTML = essay.body || "";
}

document.querySelector(".essay-nav.next").onclick = function(){
  currentEssay = (currentEssay + 1) % essays.length;
  showEssay(currentEssay);
};

document.querySelector(".essay-nav.prev").onclick = function(){
  currentEssay = (currentEssay - 1 + essays.length) % essays.length;
  showEssay(currentEssay);
};
