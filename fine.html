<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500&family=Parisienne&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,
body{
  overflow-x:hidden;
}

body{
  background:
 
  linear-gradient(
    rgba(215, 217, 241, 0.95),
    rgba(198, 198, 246, 0.95)
  );

    font-family:'Montserrat', sans-serif;
    color:#2c343e;
  
}

a{
  text-decoration:none;
  color:inherit;
}

.back-wrap{
  width:min(1120px,90%);
  margin:28px auto 0;
}

.back-link{
  font-size:11px;
  letter-spacing:1.0px;
  text-transform:uppercase;
  color:#232831;
}

.hero{
  text-align:center;
  padding:30px 20px 24px;
}


.hero h1{
  position:relative;
  display:inline-block;

  font-family:'Parisienne', cursive;
  font-size:58px;
  font-weight:400;
  letter-spacing:1px;

  color:#1f2f55;

  text-shadow:
    0 0 6px rgba(255,255,255,0.8),
    0 0 14px rgba(201,161,90,0.45);

  animation:softGlow 2.8s ease-in-out infinite;
}

@keyframes softGlow{
  0%{
    opacity:0.82;
    text-shadow:
      0 0 4px rgba(255,255,255,0.6),
      0 0 8px rgba(201,161,90,0.25);
  }

  50%{
    opacity:1;
    text-shadow:
      0 0 8px rgba(255,255,255,0.95),
      0 0 18px rgba(201,161,90,0.65),
      0 0 28px rgba(201,161,90,0.35);
  }

  100%{
    opacity:0.82;
    text-shadow:
      0 0 4px rgba(255,255,255,0.6),
      0 0 8px rgba(201,161,90,0.25);
  }
}

.hero h1::after{
  content:"";
  position:absolute;
  top:0;
  left:-40%;
  width:40%;
  height:100%;

  background:linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.75),
    transparent
  );

  transform:skewX(-20deg);
  animation:shineMove 3.5s ease-in-out infinite;
}

@keyframes shineMove{
  0%{
    left:-50%;
    opacity:0;
  }

  35%{
    opacity:0.8;
  }

  70%{
    left:110%;
    opacity:0;
  }

  100%{
    left:110%;
    opacity:0;
  }
}


.fine-wrapper{
  width:min(1120px,90%);
  margin:0 auto 80px;
}

.restaurant-layout{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:28px;
  align-items:start;
}

.restaurant-card{
  background:rgba(255,255,255,0.72);
  border-radius:26px;
  padding:24px;
  border:1px solid rgba(255,255,255,0.75);
  box-shadow:0 16px 40px rgba(0,0,0,0.06);
}
.restaurant-header{
  margin-bottom:20px;
  padding-bottom:14px;
  border-bottom:1px solid rgba(49,71,110,0.08);
}

.restaurant-header h3{
  font-family:'Cormorant Garamond', serif;
  font-size:22px;
  font-weight:600;
  color:#192335;
  margin-bottom:4px;
}

.restaurant-header span{
  display:block;
  font-size:10px;
  letter-spacing:1.2px;
  text-transform:uppercase;
  color:#151d25;
}
.photo-grid{
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:10px;
  margin-bottom:24px;
}

.photo-grid img{
  width:100%;
  height:150px;
  object-fit:cover;
  display:block;
  border-radius:14px;
}

.restaurant-info span{
  display:block;
  font-size:13px;
  letter-spacing:3px;
  text-transform:uppercase;
  color:#0f161f;
  margin-bottom:10px;
}

.restaurant-meta{
  font-size:12px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:#383e45;
  margin-bottom:12px;
}
.restaurant-info p{
  font-size:13px;
  line-height:1.2;
  color:#27313d;
  margin-bottom:10px;
}

.pager{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:28px;
  margin-top:34px;
}

.pager button{
  border:none;
  background:transparent;
  font-family:'Cormorant Garamond', serif;
  font-size:32px;
  color:#292c30;
  cursor:pointer;
}

.page-count{
  font-size:10px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:#8a96a5;
}

@media(max-width:900px){
  .pager{
    margin-top:10px;
  }
  .restaurant-layout{
    grid-template-columns:1fr;
    gap:8px;
  }

  .fine-wrapper{
    width:92%;
    margin:0 auto 40px;
  }

  .restaurant-card{
    width:100%;
    margin:0 auto 8px;
    padding:24px;
    border-radius:20px;
  }

  .restaurant-header{
    margin-bottom:16px;
    padding-bottom:12px;

  .restaurant-header h3{
    font-size:19px;
  }

  .restaurant-header span{
    font-size:8px;
    letter-spacing:1.4px;

  .photo-grid{
    grid-template-columns:repeat(2,1fr);
    gap:6px;
    margin-bottom:14px;

  .photo-grid img{

}

@media(max-width:600px){

.back-wrap{

  overflow:hidden;

.back-link{

  letter-spacing:0.7px;
  line-height:1.2;

.hero{

.hero h1{
   font-size:24px;

}

.hero h1::after{

}
}

  top:24px;

.photo-grid img{

let currentPage = 0;
const perPage = 2;

const restaurantLayout = document.getElementById("restaurantLayout");
const pageCount = document.getElementById("pageCount");

function renderRestaurants(){
  restaurantLayout.innerHTML = "";

  const start = currentPage * perPage;
  const currentRestaurants = restaurants.slice(start, start + perPage);

  currentRestaurants.forEach(place => {
    restaurantLayout.innerHTML += `
      <article class="restaurant-card">

        <div class="restaurant-header">
           <h3>${place.title}</h3>
           <span>${place.location} · ${place.date}</span>
       </div>

        <div class="photo-grid">
          ${place.images.map(img => `
            <img src="${img}" alt="${place.title}" loading="lazy">
          `).join("")}
        </div>

        <div class="restaurant-info">
          <span>${place.category}· ${getStars(place.rating)}
          </span>
          ${place.body}
        </div>

      </article>
    `;
  });

  const totalPages = Math.ceil(restaurants.length / perPage);
  pageCount.innerText = `${currentPage + 1} / ${totalPages}`;
}

function getStars(rating){

  const full = Math.floor(rating);
  const half = rating % 1 !== 0;

  let stars = "★".repeat(full);

  if(half){
    stars += "½";
  }

  stars += "☆".repeat(5 - Math.ceil(rating));

  return stars;
}


function movePage(step){
  const totalPages = Math.ceil(restaurants.length / perPage);

  currentPage += step;

  if(currentPage < 0){
    currentPage = totalPages - 1;
  }

  if(currentPage >= totalPages){
    currentPage = 0;
  }

  renderRestaurants();
}

<script>
const modal = document.getElementById('modal');
const modalImg = document.getElementById('modal-img');
const closeBtn = document.getElementById('close-btn');

let zoomLevel = 1;
let isDragging = false;
let startX = 0;
let startY = 0;
let currentX = 0;
let currentY = 0;

document.querySelectorAll('.photo-grid img').forEach(img => {
  img.addEventListener('click', () => {
    zoomLevel = 1;
    currentX = 0;
    currentY = 0;

    modal.style.display = 'flex';
    modalImg.src = img.src;

    modalImg.style.transform =
      `translate(0px, 0px) scale(1)`;
  });
});

closeBtn.addEventListener('click', () => {
  modal.style.display = 'none';
});

modal.addEventListener('click', (e) => {
  if(e.target === modal){
    modal.style.display = 'none';
  }
});

document.addEventListener('keydown', (e) => {
  if(e.key === 'Escape'){
    modal.style.display = 'none';
  }
});

modalImg.addEventListener('wheel', (e) => {
  e.preventDefault();

  if(e.deltaY < 0){
    zoomLevel += 0.15;
  } else {
    zoomLevel -= 0.15;
  }

  zoomLevel = Math.max(0.5, Math.min(zoomLevel, 3));

  modalImg.style.transform =
    `translate(${currentX}px, ${currentY}px) scale(${zoomLevel})`;
});

modalImg.addEventListener('mousedown', (e) => {
  if(zoomLevel <= 1) return;

  isDragging = true;
  startX = e.clientX - currentX;
  startY = e.clientY - currentY;

  modalImg.style.cursor = 'grabbing';
});

document.addEventListener('mousemove', (e) => {
  if(!isDragging) return;

  currentX = e.clientX - startX;
  currentY = e.clientY - startY;

  modalImg.style.transform =
    `translate(${currentX}px, ${currentY}px) scale(${zoomLevel})`;
});

document.addEventListener('mouseup', () => {
  isDragging = false;
  modalImg.style.cursor = 'grab';
});
</script>

<div id="modal" class="modal">

  <img id="modal-img" src="" alt="">
  <button id="modal-next" class="modal-nav next">›</button>
</div>
