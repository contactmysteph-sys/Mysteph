<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Stephanie's Book</title>
  <link href="https://fonts.googleapis.com/css2?family=Sacramento&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
  
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Inter', 'Noto Sans KR', sans-serif;
      color:#2F3B4A;
      background:
        linear-gradient(rgba(244,239,231,0.92), rgba(244,239,231,0.96)),
        url("Images/papertexture.jpg");
      background-size:cover;
      background-position:center;
      min-height:100vh;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    .book-banner{
      width:100%;
      height:120px;
      padding:30px 20px;
      background:#31476e;
      text-align:center;
      color:white;
    }

    .book-banner span{
      display:block;
      margin-bottom:8px;
      font-size:11px;
      letter-spacing:6px;
      text-transform:uppercase;
      color:#d8dfec;
    }

    .book-banner h1{
      font-family:Georgia, serif;
      font-size:24px;
      font-weight:400;
    }

    /* =========================
       BACK BUTTON
    ========================== */

   .back-wrapper{
      width:min(1120px,90%);
      padding-top:14x;
      margin:0 auto 10px;
      text-align:left;
    }

   .back-btn{
      display:inline-block;

      font-size:14px;
      font-weight:340;

      color:rgba(248,250,253,0.65);

      text-decoration:none;
      letter-spacing:0.5px;

      border:none;
      padding:0;

      transition:0.3s ease;
    }

    .back-btn:hover{
      opacity:0.7;
      transform:translateX(-4px);
    }


    .ebook-intro{
      width:min(900px,90%);
      margin:15px auto 10px;
      text-align:center;
    }

    .ebook-intro span{
      font-size:2px;
      letter-spacing:5px;
      text-transform:uppercase;
      color:#8a7662;
    }

    .ebook-intro h2{
      font-family:Georgia, serif;
      font-size:10px;
      font-weight:400;
      color:#31476e;
      margin:14px 0;
    }

    .ebook-intro p{
      max-width:680px;
      margin:0 auto;
      font-size:2px;
      line-height:1.8;
      color:#667181;
    }

    /* BOOK READER */
    .ebook-reader{
      width:min(1180px,92%);
      margin:45px auto 90px;
      display:grid;
      grid-template-columns:420px 1fr 48px;
      gap:34px;
      align-items:start;
    }

    /* LEFT COVER */
    .reader-cover{
      width:460px;
      height:700px;
      position:relative;
      border-radius:6px 18px 18px 6px;
      overflow:hidden;
      background:
        linear-gradient(rgba(49,71,110,0.62), rgba(49,71,110,0.88));
      background-size:cover;
      background-position:center;
      box-shadow:
        14px 18px 35px rgba(49,71,110,0.25),
        inset -14px 0 20px rgba(0,0,0,0.18);
    }

    .reader-cover::before{
      content:"";
      position:absolute;
      left:0;
      top:0;
      width:38px;
      height:100%;
      background:linear-gradient(
        to right,
        rgba(0,0,0,0.28),
        rgba(255,255,255,0)
      );
      z-index:2;
    }

    .reader-cover::after{
      content:"";
      position:absolute;
      left:28px;
      top:28px;
      right:28px;
      bottom:28px;
      border:1px solid rgba(255,255,255,0.45);
      z-index:2;
    }

    .cover-content{
      position:relative;
      z-index:3;
      height:100%;
      padding:55px 38px;
      display:flex;
      flex-direction:column;
      justify-content:flex-start;
      color:white;
      text-align:center;
    }

    .cover-content span{
      font-size:10px;
      letter-spacing:4px;
      text-transform:uppercase;
      color:#e7e9ef;
      margin-top: 20px;
    }

    .cover-content h3{
      font-family:Georgia, serif;
      font-size:32px;
      line-height:1.35;
      font-weight:400;
      margin-top: 140px;
    }

    .cover-content p{
      font-size:14px;
      font-weight:300;
      opacity: 0.75;
      color:#edf0f5;
      margin-top: 20px;
      font-family:'EB Garamond', serif;
      font-style:italic;
    }
     
    .author{
      font-family:'Cormorant Garamond', serif;
      font-size:18px;
      font-weight:400;
      margin-top:auto;
      margin-bottom:10px;
    }

    /* RIGHT PAGE */
    
    .author-note-text{
      width:100%;
      margin:0 auto;
    }

    .author-note-text p{
      font-size:12px;
      line-height:1.7;
      color:#2f3b4a;
      margin-bottom:5px;
      text-align:left;
    }

    .signature{
      font-family:'Sacramento', cursive;
      font-size:20px !important;
      color:#23395d;
      text-align:right !important;
      margin-top:36px;
    }

    .reader-page{
      max-height:700px;
      overflow-y:auto;
      background:
        linear-gradient(90deg,
          rgba(49,71,110,0.10) 0%,
          rgba(255,253,248,0.96) 5%,
          #fffdf8 18%,
          #fffdf8 100%
        );

      border:1px solid rgba(49,71,110,0.24);
      box-shadow:
        -8px 0 18px rgba(49,71,110,0.08),
        0 24px 60px rgba(49,71,110,0.14),
        inset 0 0 0 1px rgba(255,255,255,0.7);
      position:relative;
      padding:58px 64px;
    }

    .reader-page::before{
       content:"";
       position:absolute;
       top:22px;
       left:22px;
       right:22px;
       bottom:22px;
       border:1px solid rgba(49,71,110,0.10);
       pointer-events:none;
    }

    .reader-page::after{
       content:"";
       position:absolute;
       top:0;
       left:0;
       width:18px;
       height:100%;
       background:linear-gradient(
        to right,
        rgba(49,71,110,0.13),
        rgba(255,255,255,0)
      );
       pointer-events:none;
    }

    .reader-page::-webkit-scrollbar{
      width:6px;
    }

    .reader-page::-webkit-scrollbar-thumb{
      background:rgba(49,71,110,0.25);
      border-radius:10px;
    }

    .chapter-label{
      text-align:center;
      font-size:13px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform:uppercase;
      color:#A08A72;
      margin-bottom:8px;

    }

    .reader-page h2{
      font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
      font-size:20px;
      font-weight:500;
      color:#31476e;
      text-align:center;
      margin-bottom:18px;
    }

    .chapter-body p{
      font-size:15px;
      line-height:1.5;
      color:#3f4650;
      margin:0 0 7px;
      word-break:normal;
      overflow-wrap:break-word;
    }

    .chapter-image{
      margin:24px auto 26px;
      text-align:center;
    }

    .chapter-image img{
      width:90%;
      max-width:500px;
      border-radius:8px;
      box-shadow:0 14px 34px rgba(49,71,110,0.13);
    }

    .chapter-image p{
      margin-top:8px;
      font-size:11px;
      color:#8a94a3;
      font-style:italic;
    }

    /* ARROWS */
    .next-btn,
    .prev-btn{
      width:42px;
      height:42px;
      border:none;
      border-radius:50%;
      background:rgba(255,255,255,0.88);
      color:#31476e;
      font-size:20px;
      cursor:pointer;
      box-shadow:0 8px 22px rgba(49,71,110,0.13);
      transition:0.3s ease;
    }

    .next-btn:hover,
    .prev-btn:hover{
      transform:translateY(-3px);
      background:#31476e;
      color:white;
    }

    .side-buttons{
       height:760px;
       display:flex;
       flex-direction:column;
       justify-content:center;
       align-items:center;

       gap:18px;
    }

    .chapter-count{
      font-size:11px;
      color:#8a94a3;
      writing-mode:vertical-rl;
      letter-spacing:2px;
    }

    .book-note{
      width:min(900px,90%);
      margin:0 auto 70px;
      text-align:center;
      font-family:Georgia, serif;
      font-size:20px;
      line-height:1.8;
      color:#31476e;
    }


    /* 기본 상태에서 모바일 이미지는 숨김 */
    .mobile-cover {
       display: none;
       width: 100%;
       height: auto;
       margin: 0 auto 20px;
    }
    @media(max-width:900px){

      .reader-page{
        padding:20px 16px;
      }

     .chapter-body p{
       font-size:12px;
       line-height:1.6;
       letter-spacing: 1px;
      }

     /* 모바일 화면에서는 HTML 표지를 숨기고 이미지 표지를 보여줌 */
    @media (max-width: 768px) {

     .book-banner{
       height:auto;
       padding:18px 16px;
      }

     .book-banner h1{
       font-size:16px;
       line-height:1.3;
       margin:0;
     }

     .book-banner span{
       font-size:7px;
       letter-spacing:3px;
       margin-bottom:6px;
      }

     .back-wrapper{
       width:100%;
       margin:0;
       padding:0 16px 8px;
       padding-top:12px;
      }

     .back-btn{
       font-size:8px;
       letter-spacing:0.5px;
       color:rgba(255,255,255,0.65);
      }

      .reader-cover {
        display: none;
      }
      .mobile-cover {
        display: block;
      }

      .ebook-intro span{
        font-size:10px;
      }

      .ebook-intro h2{
        font-size:24px;
      }

      .ebook-intro p{
        font-size:14px;
      }

     .ebook-reader{
       grid-template-columns:1fr;
       gap:20px;
      }

      .reader-page::before{
       top:12px;
       left:12px;
       right:12px;
       bottom:12px;
      }

     .side-buttons{
       height:auto;
       display:flex;
       flex-direction:row;
       justify-content:center;
       align-items:center;
       gap:16px;
       margin:0 auto 50px;
      }
      
     .chapter-count{
       writing-mode:horizontal-tb;
      }

     .book-note{
       display:none;
      }
    }
  }
  </style>
</head>

<body>

  <section class="book-banner">
    <span>Stephanie's Book</span>
    <h1>A Story About Home, Told by the Sea</h1>

    <!-- LEFT BOTTOM -->

    <div class="back-wrapper">
      <a href="mind.html" class="back-btn">
        Back to Home
     </a>
   </div>
  </section>

  <section class="ebook-intro">
    <span></span>
    <h2></h2>
    <p>
    </p>
  </section>

  <main class="ebook-reader">

    <!-- LEFT BOOK COVER -->
    <section class="reader-cover">
      <div class="cover-content">
        <span>A NOVELLA</span>

        <h3>
          섬 고양이<br>
      
        </h3>
        <p>
          Whisphers from an Island
        </p>

        <div class="author">
          Stephanie Jo
        </div>
      </div>
    </section>
    
    <!-- Mobile Image Cover -->
    <img src="Images/ebook2.jpg" alt="섬 고양이 Cover" class="mobile-cover">


    <!-- RIGHT CHAPTER PAGE -->
    <section class="reader-page">
      <div class="chapter-label" id="chapter-label"></div>
      <h2 id="chapter-title"></h2>
      <div class="chapter-body" id="chapter-body"></div>
    </section>

    <!-- SIDE BUTTONS -->
    <div class="side-buttons">
      <button class="prev-btn" onclick="changeChapter(-1)">&#10094;</button>
      <div class="chapter-count" id="chapter-count"></div>
      <button class="next-btn" onclick="changeChapter(1)">&#10095;</button>
    </div>

  </main>

  <div class="book-note">
    “Some stories are not written because they are finished.<br>
    They are written because they stayed.”
  </div>

  <script>
    const chapters = [

     {
        label:"Author's Note",
        title:"갑자기, 작은 책 하나",
        body:`
          <div class="author-note-text">
           
           <p>
            사실 이 이야기는 처음부터 책이 되기 위해 시작된 것은 아니었습니다.
           </p>

           <p>
            처음에는 웹사이트를 만드는 일이 그저 신기하고 재미있었습니다.
           </p>

           <p>
            기기와 저장 매체를 여러 번 바꾸다 보니,
            사진들이 하나둘 사라지는 일이 생기고..
            사진 자체도 아쉬웠지만,
            그 안에 담겨 있던 기억과 순간들이 함께 희미해지는 것이 더 아쉽게 느껴졌습니다.
           </p>

           <p>
            그래서 예전에 남겨 두었던 블로그 글과 기록들을 바탕으로
            갤러리와 여행 블로그를 만들기 시작했습니다.
            그러다 문득,
            그 많은 이야기들 중 하나를 골라 작은 소설로 써보면 어떨까 하는 생각이 들었습니다.
            <br>이 책은 그렇게 시작되었습니다.
           </p>

           <p>
            원래는 제가 좋아하는 추리 소설을 써보고 싶었는데 역량이 부족하여 
            결국은 마음이 따뜻해지는 동화 같은 이야기가 탄생하게 되었습니다.
           </p>

           <p>
            이야기 속에 등장하는 섬에서 만난 고양이와 여러 장의 삽화는
            실제 사진과 영상, 그리고 제가 경험했던 순간들을 바탕으로 만들어졌습니다.
           </p> 
           <p> 물론 고양이가 정말 말을 하지는 않습니다.^^
           </p>

           <p>
            원래는 모든 이야기를 완성한 뒤 웹사이트를 공개하려고 했습니다.
            하지만 한 번에 모든 것을 보여주는 것보다,
            가끔 들러 새로운 이야기를 읽고 잠시 쉬어 갈 수 있는 공간이 되는 것도 좋겠다는 생각에 
            아직 완성되지 않은 모습으로 먼저 공개하게 되었습니다.
           </p>

           <p>
            혹시 앞으로의 이야기 전개나 개선할 점에 대한 의견이 있다면
            Notes에 자유롭게 남겨 주세요.
            감사합니다.
           </p>
                     
           <p class="signature">Stephanie</p>

          </div>
        `
      },

      {
        label:"Chapter 1",
        title:"모래사장 위의 낙서",
        body:`

          <div class="chapter-image">
            <img src="Images/book1.png" alt="Redang evening beach">
            <p>The evening when the sea felt like another world.</p>
          </div>

          <p>2020년 가을.</p>
          <p>정확히는 가을이라고 부르기에도 애매한 시간이었다. 이 곳엔 여름만 존재하니..</p>
          <p>세상은 여전히 긴 터널 안에 갇혀 있었다.</p>
          <p>사람들은 언젠가 끝날 거라고 말했지만, 그 언젠가는 생각보다 훨씬 늦게 찾아왔다.</p>
          <p>처음 몇 달은 괜찮았다.</p>
          <p>집에 있는 시간이 길어져도 책을 읽고, 영화를 보고, 요리를 하며 시간을 보낼 수 있었다.</p>
          <p>하지만 달력이 여러 장 넘어가자 조금씩 불안해졌다.</p>
          <p>아무리 시간이 지나도 내 하루는 변하지 않았다.</p>
          <p>어제와 오늘이 비슷했고, 오늘과 내일도 비슷했다.</p>
          <p>가끔은 시간이 정말 흐르고 있는 건지 의심스러울 정도였다.</p>
          <p>어느 날 아침에는 문득 이런 생각까지 들었다.</p>
          <p>혹시 시간이 멈춘 건 아닐까.</p>
          <p>나만 눈치채지 못한 채 같은 하루를 반복하고 있는 건 아닐까.</p>
          <p>그럴 때마다 나는 영화 트루먼 쇼를 떠올렸다.</p>
          <p>어쩌면 지금 내가 있는 이 세상도 거대한 세트장일지 모른다고.</p>
          <p>어딘가 숨겨진 문 하나만 열면 진짜 세상이 나타날지도 모른다고.</p>

          <p>그 무렵, 조심스럽게 이동 제한이 완화되었다.</p>
          <p>나는 오래 고민하지 않았다.</p>
          <p>어디든 떠나고 싶었다.</p>
          <p>숨 쉴 수 있는 공간으로.</p>

          <p>현실적으로 이동 가능한 바다를 골라 떠났다.</p>
          <p>배가 섬에 가까워질수록 짙은 남색이 에메랄드빛으로 바뀌고, 다시 투명한 유리 같은 색으로 변했다.</p>

          <p>바다는 아름답고 평온했다.</p>
          <p>그런데 이상하게도.</p>
          <p>그 아름다움이 나를 더 외롭게 만들었다.</p>
          <p>아련한 그리움이 일었다.</p>
          <p>언제든 만날 수 있다고 생각했던 사람들.</p>
          <p>언제든 갈 수 있다고 생각했던 장소들.</p>
          <p>보고 싶었다.</p>

          <p>그날 저녁.</p>
          <p>나는 해변을 따라 천천히 걷다가 모래 사장에 앉아 
          조용히 밀려왔다가 사라지고를 반복하는 파도를 멍하니 바라보고 있었다.
          <p>주변에는 뛰어 노는 아이들과 모처럼 맞게 된 자유를 맘껏 즐기는 여행자들의 웃음소리가 가득했다.</p>
          <p>하지만 나는 묘한 위화감을 느꼈다. 아무도 알지 못하는 공간에 나만 혼자 남겨진 기분이었다.</p>

          <p>나는 막대기 하나를 주워 모래 위에 글씨를 적었다.</p>
          <p>보고 싶다.</p>
          <p>파도가 다가왔다.</p>
          <p>그리고 천천히 글씨를 지워버렸다.</p>
          <p>마치 처음부터 아무것도 없었다는 것처럼.</p>

          <p>감자기 내 행동에 민망함을 느끼며 앉아 있을 때.</p>
          <p>어디선가 아주 작은 그림자가 다가왔다.</p>
          <p>고양이였다.</p>
          <p>연한 회색 털.</p>
          <p>조금 젖은 귀.</p>
          <p>그리고 이상할 만큼 깊은 바다색 눈동자.</p>

          <p>고양이는 내 앞에서 멈춰 섰다.</p>
          <p>그리고 한참 동안 나를 바라보았다.</p>
          <p>마치 오래전부터 알고 있었다는 듯이.</p>

          <p>냐옹아 하고 불러보았다.</p>

    let currentChapter = 0;

    function renderChapter(){
      const chapter = chapters[currentChapter];

      document.getElementById("chapter-label").innerText = chapter.label;
      document.getElementById("chapter-title").innerText = chapter.title;
      document.getElementById("chapter-body").innerHTML = chapter.body;
      document.getElementById("chapter-count").innerText =
        (currentChapter + 1) + " / " + chapters.length;

      document.querySelector(".reader-page").scrollTop = 0;
    }

    function changeChapter(step){
      currentChapter += step;

      if(currentChapter < 0){
        currentChapter = chapters.length - 1;
      }

      if(currentChapter >= chapters.length){
        currentChapter = 0;
      }

      renderChapter();
    }

    renderChapter();
