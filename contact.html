<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact | Wandering with Steph</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Inter', sans-serif;

      background:
        url('Images/Menu/back3.png');

      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      background-attachment:fixed;

      color:#2F3B4A;
      line-height:1.8;
      min-height:100vh;
    }

    body::before{
      content:'';
      position:fixed;
      inset:0;
      background:radial-gradient(
        circle at 50% -10%,
        rgba(255,255,255,0.65),
        transparent 45%
      );
      pointer-events:none;
      z-index:-1;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    .top-nav{
      width:1000px;
      margin: 0 auto;
      margin:14px auto 0;
      display:flex;
      justify-content:space-between;
      font-size:13px;
      letter-spacing:1.5px;
      text-transform:uppercase;
      color:#363a3f;
    }

    .page-wrap{
       max-width: 1000px;
       margin: 0 auto;
    }

    .page-header{
      text-align:center;
      margin-bottom:20px;
    }

    .page-header h1{
      font-family:'Merriweather', serif;
      font-size:20px;
      font-weight:600;
      color:#3f4653;
    }

    .contact-card{
      background:linear-gradient(
        135deg,
        rgba(173, 176, 178, 0.95),
        rgba(206, 216, 226, 0.95)
      );
      
      backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,0.8);
      border-radius:20px;
      padding:20px 30px;
      box-shadow:0 25px 60px rgba(32,52,90,0.12);
      margin-bottom:20px;
      text-align:center;

    }

    .contact-card h2{
      font-family:'Playfair Display', serif;
      font-size:18px;
      font-weight:600;
      color:#2c3038;
      margin-bottom:10px;
      text-align:center;
    }

    .contact-card p{
      text-align:center;
      font-size:15px;
      color:#484f57;
      margin-bottom:14px;
    }

    .email-box{
      display:inline-block;

      margin-top:12px;
      padding:10px 20px;

      background:linear-gradient(
       135deg,
       rgba(245,248,252,0.95),
       rgba(187, 189, 191, 0.95)
      );

      border:1px solid rgba(255,255,255,0.7);
      border-radius:999px;
      box-shadow:
        0 8px 20px rgba(0,0,0,0.08),
        inset 0 1px 0 rgba(255,255,255,0.9);
        color:#2F3B4A;
        width:auto;
    }

    .email-box a{
      color:#31476E;
      text-decoration:none;
      font-size:14px;
      font-weight:500;
      letter-spacing:0.3px;
    }

    .email-box:hover{
      transform:translateY(-2px);

      box-shadow:
       0 12px 28px rgba(0,0,0,0.10),
       inset 0 1px 0 rgba(198, 219, 237, 0.9);

      transition:0.3s ease;
    }

    .email-box p{
      margin-bottom:0px;
    }

    .guest-form{
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .guest-form input,
    .guest-form textarea{
      width:100%;
      border:1px solid rgba(47,59,74,0.18);
      border-radius:16px;
      padding:20px 25px;
      font-family:'Inter', sans-serif;
      font-size:16px;
      color:#0e1216;
      background:rgba(255,255,255,0.9);
      outline:none;
    }

    .guest-form textarea{
      min-height:150px;
      resize:vertical;
    }

    .secret-check{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:13px;
      color:#66717f;
      margin-left:4px;
    }

    .secret-check input{
      width:auto;
    }

    .guest-form button{
      align-self:center;
      border:none;
      border-radius:999px;
      padding:12px 30px;
      background:#2F3B4A;
      color:white;
      font-size:13px;
      letter-spacing:1px;
      cursor:pointer;
      transition:0.3s ease;
    }

    .guest-form button:hover{
      background:#3A4A5C;
      transform:translateY(-3px);
    }

    .notes-list{
      margin-top:28px;
      display:flex;
      flex-direction:column;
    }

    .note-item{
      padding:14px 12px;
      border-bottom:1px solid rgba(47,59,74,0.12);
      background:none;
      border-radius:0;
      box-shadow:none;
    }

    .note-item strong{
      display:block;
      font-family:'Merriweather', serif;
      font-size:14px;
      font-weight:500;
      color:#464b53;
      margin-bottom:4px;
    }

    .note-item p{
      text-align:left;
      line-height:1.5;
      margin:2px 0;
      font-size:13px;
      color:#bfc2c6;
    }

    .note-date{
      display:block;
      margin-top:4px;
      font-size:11px;
      color:#b6babf;
      letter-spacing:1px;
      text-transform:uppercase;
    }

    .note-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }

    .delete-btn{
      border:none;
      background:none;
      color:#8a94a3;
      font-size:11px;
      cursor:pointer;
    }

    .delete-btn:hover{
      color:#2F3B4A;
    }

    @media (max-width:600px){

     .top-nav{
       width:92%;
       margin:12px auto 0;
       font-size:11px;
      }

     .page-wrap{
       width:90%;
       margin:10px auto 30px;
      }

     .page-header h1{
       font-size:20px;
      }

     .contact-card{
       padding:16px 14px;
       border-radius:16px;
      }

     .contact-card h2{
       font-size:16px;
      }

     .contact-card p{
       font-size:11px;
       line-height:1.6;
      }

     .email-box{
       padding:8px 16px;
      }

     .email-box a{
       font-size:11px;
       word-break:break-all;
      }

     .guest-form{
       gap:10px;
      }

     .guest-form input,
     .guest-form textarea{
       padding:12px px;
       font-size:12px;
      }

     .guest-form textarea{
       min-height:120px;
      }

     .guest-form button{
       padding:10px 24px;
       font-size:11px;
      }

     .note-item{
       padding:12px 8px;
      }

     .note-item strong{
       font-size:12px;
      }

     .note-item p{
       font-size:11px;
      }

     .note-date{
       font-size:10px;
      }
    }

  </style>

</head>

<body>

  <nav class="top-nav">
    <a href="index.html">← BACK TO HOME</a>
  </nav>

  <main class="page-wrap">

    <header class="page-header">
      <h1>Leave a Note</h1>
    </header>

    <section class="contact-card">
      <h2>Contact Stephanie</h2>
      
      <p>
        잠시 머물러 주셔서 감사합니다.
      </p>
      <p>
        이 공간이 작은 쉼터가 되었거나,어떤 추억을 떠올리게 했다면
        짧은 흔적 하나 남겨주세요.
      </p>

      <p>
        Thank you for visiting my little corner of the world.</p>
      <p>
        If something here made you smile,pause, remember,
        please leave a note  or say hello at
      </p>
      
      <div class="email-box">
        <p>
        </p>

        <a href="mailto:contactmysteph@gmail.com">
          contactmysteph@gmail.com
        </a>
      </div>
    </section>

    <form class="guest-form" id="guestForm">
      <input type="text" id="guestName" placeholder="Your name or nickname" required>

      <textarea id="guestMessage" placeholder="Write a small note..." required></textarea>

      <label class="secret-check">
        <input type="checkbox" id="isSecret">
        <span>Secret note</span>
      </label>

      <button type="submit">Leave Note</button>
    </form>

    <div class="notes-list" id="notesList"></div>

  </main>

  <script>
    const guestForm = document.getElementById('guestForm');
    const guestName = document.getElementById('guestName');
    const guestMessage = document.getElementById('guestMessage');
    const notesList = document.getElementById('notesList');
    const isSecret = document.getElementById('isSecret');

    let guestNotes = JSON.parse(localStorage.getItem('guestNotes')) || [];

    function renderNotes(){
      notesList.innerHTML = '';

      guestNotes.slice(-20).reverse().forEach(note => {
        const noteItem = document.createElement('div');
        noteItem.className = 'note-item';

        noteItem.innerHTML = `
          <strong>${note.name}</strong>
          <p>${note.secret ? '🔒 This is a secret note.' : note.message}</p>
          <span class="note-date">${note.date}</span>
        `;

        notesList.appendChild(noteItem);
      });
    }

    function deleteNote(index){
      guestNotes.splice(index, 1);
      localStorage.setItem('guestNotes', JSON.stringify(guestNotes));
      renderNotes();
    }

      guestForm.addEventListener('submit', function(e){
        e.preventDefault();

        const newNote = {
         name: guestName.value,
         message: guestMessage.value,
         secret: isSecret.checked,
         date: new Date().toLocaleDateString()
        };

      guestNotes.push(newNote);
      localStorage.setItem('guestNotes', JSON.stringify(guestNotes));

      guestName.value = '';
      guestMessage.value = '';
      isSecret.checked = false;

      renderNotes();
    });

    renderNotes();
  </script>

</body>
</html>
